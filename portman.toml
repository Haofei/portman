# portman project configuration for the tinygrad -> tinygrad-rsmc port.
# Paths are RELATIVE to this file, so a clone placed next to the source repos
# works unchanged. Regenerate for a fresh port with `portman init`.
project = "tinygrad-rsmc"

db = "mappings/port.db"
reports = "reports"

[upstream]
repo = "tinygrad"
root = "../tinygrad/tinygrad"                 # the Python package, not the whole repo
adapter = "python"
version = "5d5ead78dad797b0b914377d5d568efd377235ca"   # pinned baseline (2026-06-13)
# runtime/autogen is machine-generated and vendored verbatim; not a hand-port target.
exclude = ["runtime/autogen", "__pycache__"]

[target]
repo = "tinygrad-rss"
root = "../tinygrad-rsmc/tinygrad-rss/src"
adapter = "rss"
version = "working"                           # target tracks the working tree
exclude = ["vendor", "__pycache__"]
# Prefer a compiler-produced JSON inventory over scraping .rss text, when present
# (#4). Source-level qualnames match upstream exactly. Falls back to the scraper
# if the file is absent. See docs/02 for the schema.
# inventory = "../tinygrad-rsmc/tinygrad-rss/build/inventory.json"

# Foundational-path bonuses for gap risk ranking. Library-specific and optional;
# kept in config (not hard-coded) so the framework stays library-agnostic.
[risk]
high = ["dtype", "uop/ops", "tensor", "device", "helpers"]
medium = ["nn", "engine", "runtime", "codegen", "renderer"]

# Coverage-by-source-area (#5): area name -> path prefixes (first match wins).
[areas]
tensor = ["tensor.py"]
dtype = ["dtype.py"]
helpers = ["helpers.py"]
uop = ["uop/"]
codegen = ["codegen/"]
renderer = ["renderer/"]
runtime = ["runtime/"]
nn = ["nn/"]
engine = ["engine/"]

# Copied/generated roots (#6): tracked separately, never suggested as hand-port
# batches. (Excluded from inventory entirely by [upstream].exclude above; move a
# root here instead of excluding it if you want copied-coverage tracking.)
[copied]
roots = []

# Reasoned suppressions (#7): out-of-scope files/symbols, shown separately.
[ignore]
# "examples/beautiful_mnist.py" = "example not runnable / missing upstream pieces"

# Declared gap-reason overrides (#2): things portman can't derive.
[gap_reasons]
# "runtime/support/am/ip.py::*" = "blocked_by_rss"

# Dependency hints (#8): upstream symbols that unlock downstream work, ranked first.
[deps]
boost = ["uop/ops.py::UOp.const", "uop/ops.py::UOp.alu", "dtype.py::dtypes"]

# Suggested verification command included in batch manifests (#9).
[verify]
# Paths are relative to the workspace (siblings checked out next to each other);
# in the Docker dev env these are pre-set. See ../tinygrad-rsmc/docs/DOCKER.md.
command = "cd ../tinygrad-rsmc && RSSCRIPT_RUNTIME_PATH=../rsscript/crates/runtime ../rsscript/target/release/rss run tinygrad-rss && PYTHONPATH=../tinygrad python3 oracle/roundtrip.py"

# Project-specific cross-language naming conventions for auto-mapping. All optional
# and empty/off by default — the engine itself is library-agnostic; everything
# below encodes how tinygrad (Python) -> tinygrad-rss (rsscript) specifically maps.
[mapping]
# A Python method `Tensor.to_` (trailing _, in-place) maps to `tensor_to_inplace`.
inplace_suffix = "_inplace"
# A method whose leaf the target preserves verbatim (Python dunders __hash__) wins
# the exact name over a normalized tie.
dunder_passthrough = true
# owner_qualified defaults true: `Tensor.reshape` matches a flattened `tensor_reshape`.

[mapping.type_aliases]
# target struct/receiver name -> upstream type name(s) it implements
TGBuffer = ["Buffer"]

[mapping.owner_prefix_aliases]
# upstream owner class -> target qualname prefixes that flatten its methods
DTypeMixin = ["mixin_dtype"]
UPat = ["upat"]

# A flat target fn whose first param is an interned-cache type and second is
# (id, Int) is really a method of `owner` (after stripping `strip_prefix`).
[mapping.receiver_methods.UOpCache]
owner = "UOp"
strip_prefix = "uop_"

# Forced symbol links (#1) for names the matcher can't bridge (namespace
# flattening, typevars, renames). upstream "path::Qual" -> target "path::Qual".
# These are re-derived from config each `map` (confidence=config, not committed
# to curated.jsonl). For one-off decisions use `portman link UP TARGET`.
[mapping.symbol_links]
"device.py::Device" = "device.rss::Device"
"helpers.py::CACHEDB" = "helpers.rss::CACHEDB"
"helpers.py::cache_dir" = "helpers.rss::helpers_cache_dir"
"helpers.py::count" = "helpers.rss::helpers_count"
"helpers.py::cpu_events" = "helpers.rss::helpers_cpu_events"
"helpers.py::T" = "helpers.rss::helpers_T"
"helpers.py::U" = "helpers.rss::helpers_U"
"tensor.py::P" = "tensor.rss::tensor_P_typevar"
"tensor.py::T" = "tensor.rss::tensor_T_typevar"

# Example of adding a brand-new target language with zero code, via the generic
# regex adapter. Reference only — not used by the tinygrad port above.
[adapters.go]
patterns = ["*.go"]
[adapters.go.rules]
function = "^func\\s+(?:\\([^)]*\\)\\s*)?([A-Za-z_][A-Za-z0-9_]*)\\s*\\("
type = "^type\\s+([A-Za-z_][A-Za-z0-9_]*)\\s"
constant = "^const\\s+([A-Za-z_][A-Za-z0-9_]*)\\b"
