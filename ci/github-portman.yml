# Drop into .github/workflows/portman.yml in the TARGET repo (tinygrad-rsmc).
# Gates: setup is sane (doctor), provenance must not regress, port % must not
# drop, deviations must be documented; posts a dashboard + upgrade report.
#
# Set these repo variables/secrets or edit inline:
#   UPSTREAM_REPO   e.g. tinygrad/tinygrad
#   UPSTREAM_REF    pinned baseline commit
#   PORTMAN_REPO    where this framework lives (vendored or its own repo)
name: portman

on:
  pull_request:
  push: { branches: [master, main] }
  schedule:
    - cron: "0 6 * * 1"   # Monday: check upstream for a new release

env:
  UPSTREAM_REPO: tinygrad/tinygrad
  UPSTREAM_REF: fa400f9790ab9a684387b02e958658217b33e7c1
  PORTMAN_REPO: Haofei/portman

jobs:
  port-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target
        uses: actions/checkout@v4
        with: { path: target }
      - name: Checkout upstream at pinned baseline
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: ${{ env.UPSTREAM_REF }}
          path: upstream
          fetch-depth: 0
      - name: Checkout portman framework
        uses: actions/checkout@v4
        with: { repository: "${{ env.PORTMAN_REPO }}", path: portman }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }   # tomllib needs >=3.11

      - name: Generate config for CI checkout paths
        working-directory: portman
        run: |
          PYTHONPATH=src python -m portman init --force \
            --project tinygrad-rsmc \
            --upstream-root "$GITHUB_WORKSPACE/upstream/tinygrad" \
            --upstream-adapter python \
            --upstream-version "$UPSTREAM_REF" \
            --target-root "$GITHUB_WORKSPACE/target/tinygrad-rss/src" \
            --target-adapter rss

      - name: Doctor (fail fast on broken setup)
        working-directory: portman
        run: PYTHONPATH=src python -m portman doctor

      - name: Build inventory + map
        working-directory: portman
        run: make inventory map

      - name: Gate — no parse errors / duplicate mappings
        working-directory: portman
        run: PYTHONPATH=src python -m portman doctor   # FAILs on parse errors et al.

      - name: Gate — provenance headers present
        working-directory: portman
        run: |
          missing=$(PYTHONPATH=src python -m portman provenance lint | grep -c MISSING || true)
          echo "files missing provenance: $missing"
          test "$missing" -le "${PORTMAN_MAX_MISSING:-9999}"   # ratchet this down over time

      - name: Gate — public-API coverage did not regress
        working-directory: portman
        run: |
          PYTHONPATH=src python -m portman status --json > now.json
          python - <<'PY'
          import json, os
          now = json.load(open("now.json"))["public_api_pct"]
          floor = float(open("port_floor.txt").read()) if os.path.exists("port_floor.txt") else 0.0
          assert now + 0.1 >= floor, f"public-API coverage regressed: {now}% < floor {floor}%"
          print(f"OK public-API={now}% floor={floor}%")
          PY

      - name: Behavioral verification (differential/oracle harness)
        working-directory: portman
        # Wire VERIFY_CMD to the target's oracle (docs/08). No silent pass:
        run: make verify VERIFY_CMD="python $GITHUB_WORKSPACE/target/oracle/roundtrip.py"

      - name: Render dashboard + upgrade report
        working-directory: portman
        run: |
          make report
          LATEST=$(git -C "$GITHUB_WORKSPACE/upstream" tag --sort=-creatordate | head -1 || true)
          if [ -n "$LATEST" ] && [ "$LATEST" != "$UPSTREAM_REF" ]; then
            PYTHONPATH=src python -m portman snapshot --version "$LATEST" || true
            PYTHONPATH=src python -m portman diff "$UPSTREAM_REF" "$LATEST" || true
          fi

      - name: Publish to job summary
        working-directory: portman
        run: cat reports/dashboard.md >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with: { name: port-reports, path: portman/reports/ }
